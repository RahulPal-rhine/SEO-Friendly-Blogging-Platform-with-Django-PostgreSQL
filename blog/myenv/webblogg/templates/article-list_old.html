<!DOCTYPE html>
<html>
<head>
  <title>Rahul Pal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#faf9f7] text-gray-900 font-serif">

<main class="max-w-4xl mx-auto px-6 py-20">

  <!-- Author Intro -->
  <section class="mb-20">
    <h1 class="text-6xl md:text-7xl leading-tight">
      Rahul<br>Pal
    </h1>
    <p class="text-gray-400 mt-3">@rahulpal</p>
    <p class="mt-8 text-xl max-w-2xl">
      Writing about markets, money, risk, and long-term thinking.
    </p>
  </section>

  <hr class="border-gray-300 mb-20">

  <!-- Articles -->
  {% for article in articles %}
  <article class="flex flex-col md:flex-row justify-between gap-8 mb-20">

    <div>
      <h2 class="text-4xl mb-4 hover:underline">
        <a href="{% url 'detail_page' article.id %}">
          {{ article.title }}
        </a>
      </h2>

      <p class="text-sm uppercase text-gray-500">
        By {{ article.author }} — {{ article.published_date }}
      </p>
    </div>

    <a
      href="{% url 'detail_page' article.id %}"
      class="border border-gray-300 px-6 py-3 uppercase text-sm hover:bg-black hover:text-white transition"
    >
      Read More →
    </a>

  </article>
  {% endfor %}

</main>

</body>
</html>
