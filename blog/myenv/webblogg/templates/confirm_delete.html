
<!DOCTYPE html>

<html>
<head>
<title>Confirm Delete</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#faf9f7] text-gray-900 font-serif h-screen flex items-center justify-center">

<div class="max-w-md w-full bg-white border border-gray-200 p-10 text-center shadow-sm">
    <h1 class="text-2xl mb-4">Are you sure?</h1>
    <p class="text-gray-500 mb-8 leading-relaxed">
        You are about to permanently delete <br>
        <span class="text-black font-bold">"{{ article.title }}"</span>.
    </p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" 
            class="w-full bg-red-600 text-white py-3 uppercase text-xs tracking-[0.2em] hover:bg-red-700 transition mb-4">
            Confirm Delete
        </button>
        
        <a href="{% url 'article_list' %}" 
           class="block text-xs uppercase tracking-widest text-gray-400 hover:text-black">
           Cancel and Go Back
        </a>
    </form>
</div>
</body>
</html>
